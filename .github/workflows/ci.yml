name: ci

on:
  push:
  pull_request:

jobs:
  guard-tests:
    name: guard tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure jq is installed
        shell: bash
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            if [ "$RUNNER_OS" = "macOS" ]; then
              brew install jq
            else
              sudo apt-get update && sudo apt-get install -y jq
            fi
          fi
          jq --version
      - name: Run guard unit tests
        run: bash plugins/peek/tests/test-peek-guard.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure shellcheck is installed
        run: |
          command -v shellcheck >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y shellcheck; }
          shellcheck --version
      - name: Lint guard and tests
        run: shellcheck plugins/peek/scripts/peek-guard.sh plugins/peek/tests/test-peek-guard.sh
